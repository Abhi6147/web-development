<html>
<head>
    <title>Lists Example</title>
</head>
<body>

    <h2>Shopping List</h2>
    <ul type="square">
        <li>Coffee</li>
        <li>Milk</li>
        <li>Sugar</li>
        <li>Friuts</li>
    </ul>

    <hr>

    <h2>Morning Routine</h2>
    <ol type="I">
        <li>Brew coffee</li>
        <li>Workout for 10 minutes</li>
        <li>Breakfast</li>
        <li>Attend college</li>
    </ol>

</body>
</html>
